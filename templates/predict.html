{% extends "base.html" %}

{% block title %}Predict Churn{% endblock %}

{% block content %}
<div class="page-header">
    <div class="container">
        <h1>Customer Churn Prediction</h1>
        <p>Enter customer information below to generate a churn prediction with probability score and risk classification.</p>
    </div>
</div>

<div class="container">
    <form method="POST" class="form-card">
        <div class="form-section-title">Demographics &amp; Account</div>
        <div class="form-grid">
            <div class="form-group">
                <label for="gender">Gender</label>
                <select id="gender" name="gender" class="form-select">
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>
            <div class="form-group">
                <label for="SeniorCitizen">Senior Citizen</label>
                <select id="SeniorCitizen" name="SeniorCitizen" class="form-select">
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>
            </div>
            <div class="form-group">
                <label for="Partner">Partner</label>
                <select id="Partner" name="Partner" class="form-select">
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>
            <div class="form-group">
                <label for="Dependents">Dependents</label>
                <select id="Dependents" name="Dependents" class="form-select">
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>
            <div class="form-group">
                <label for="tenure">Tenure (months)</label>
                <input type="number" id="tenure" name="tenure" class="form-control" min="0" required>
            </div>
            <div class="form-group">
                <label for="Contract">Contract</label>
                <select id="Contract" name="Contract" class="form-select">
                    <option value="Month-to-month">Month-to-month</option>
                    <option value="One year">One year</option>
                    <option value="Two year">Two year</option>
                </select>
            </div>
        </div>

        <div class="form-section-title" style="margin-top: 2rem;">Services</div>
        <div class="form-grid">
            <div class="form-group">
                <label for="PhoneService">Phone Service</label>
                <select id="PhoneService" name="PhoneService" class="form-select">
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>
            <div class="form-group">
                <label for="MultipleLines">Multiple Lines</label>
                <select id="MultipleLines" name="MultipleLines" class="form-select">
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                    <option value="No phone service">No phone service</option>
                </select>
            </div>
            <div class="form-group">
                <label for="InternetService">Internet Service</label>
                <select id="InternetService" name="InternetService" class="form-select">
                    <option value="DSL">DSL</option>
                    <option value="Fiber optic">Fiber optic</option>
                    <option value="No">No</option>
                </select>
            </div>
            <div class="form-group">
                <label for="OnlineSecurity">Online Security</label>
                <select id="OnlineSecurity" name="OnlineSecurity" class="form-select">
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                    <option value="No internet service">No internet service</option>
                </select>
            </div>
            <div class="form-group">
                <label for="OnlineBackup">Online Backup</label>
                <select id="OnlineBackup" name="OnlineBackup" class="form-select">
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                    <option value="No internet service">No internet service</option>
                </select>
            </div>
            <div class="form-group">
                <label for="DeviceProtection">Device Protection</label>
                <select id="DeviceProtection" name="DeviceProtection" class="form-select">
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                    <option value="No internet service">No internet service</option>
                </select>
            </div>
            <div class="form-group">
                <label for="TechSupport">Tech Support</label>
                <select id="TechSupport" name="TechSupport" class="form-select">
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                    <option value="No internet service">No internet service</option>
                </select>
            </div>
            <div class="form-group">
                <label for="StreamingTV">Streaming TV</label>
                <select id="StreamingTV" name="StreamingTV" class="form-select">
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                    <option value="No internet service">No internet service</option>
                </select>
            </div>
            <div class="form-group">
                <label for="StreamingMovies">Streaming Movies</label>
                <select id="StreamingMovies" name="StreamingMovies" class="form-select">
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                    <option value="No internet service">No internet service</option>
                </select>
            </div>
        </div>

        <div class="form-section-title" style="margin-top: 2rem;">Billing</div>
        <div class="form-grid">
            <div class="form-group">
                <label for="PaperlessBilling">Paperless Billing</label>
                <select id="PaperlessBilling" name="PaperlessBilling" class="form-select">
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>
            <div class="form-group">
                <label for="PaymentMethod">Payment Method</label>
                <select id="PaymentMethod" name="PaymentMethod" class="form-select">
                    <option value="Electronic check">Electronic check</option>
                    <option value="Mailed check">Mailed check</option>
                    <option value="Bank transfer (automatic)">Bank transfer (automatic)</option>
                    <option value="Credit card (automatic)">Credit card (automatic)</option>
                </select>
            </div>
            <div class="form-group">
                <label for="MonthlyCharges">Monthly Charges ($)</label>
                <input type="number" step="0.01" id="MonthlyCharges" name="MonthlyCharges" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="TotalCharges">Total Charges ($)</label>
                <input type="number" step="0.01" id="TotalCharges" name="TotalCharges" class="form-control" required>
            </div>
        </div>

        <div class="form-submit">
            <button type="submit" class="btn btn-primary btn-lg">Predict Churn</button>
        </div>
    </form>
</div>
{% endblock %}
